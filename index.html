<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#5865f2">
    <title>Димаграм - Современный мессенджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1e1e1e;
            --bg-tertiary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --danger: #ed4245;
            --success: #23a55a;
            --warning: #faa81a;
            --border: #3b3b3b;
            --message-bg-me: #2b2d31;
            --message-bg-other: #1e1f22;
            --shadow: rgba(0, 0, 0, 0.3);
            --transition: all 0.2s ease;
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #e8e8e8;
            --text-primary: #000000;
            --text-secondary: #666666;
            --border: #e0e0e0;
            --message-bg-me: #e3f2fd;
            --message-bg-other: #f5f5f5;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            transition: var(--transition);
        }

        /* ========== ОСНОВНОЙ КОНТЕЙНЕР ========== */
        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* ========== БОКОВАЯ ПАНЕЛЬ (ЧАТЫ) ========== */
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        .logo i {
            color: var(--accent);
            font-size: 28px;
        }

        .logo span {
            background: linear-gradient(135deg, #5865f2, #4752c4);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--accent);
            transform: scale(1.05);
        }

        /* Поиск */
        .search-bar {
            margin: 15px;
            padding: 10px 15px;
            background: var(--bg-tertiary);
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
        }

        .search-bar:focus-within {
            box-shadow: 0 0 0 2px var(--accent);
        }

        .search-bar i {
            color: var(--text-secondary);
        }

        .search-bar input {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            width: 100%;
            outline: none;
        }

        .search-bar input::placeholder {
            color: var(--text-secondary);
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 5px;
            position: relative;
        }

        .chat-item:hover {
            background: var(--bg-tertiary);
            transform: translateX(5px);
        }

        .chat-item.active {
            background: var(--accent);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-last-message {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .unread-badge {
            background: var(--accent);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        /* Карточка пользователя */
        .user-card {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
        }

        .user-card .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }

        .user-card .user-info {
            flex: 1;
        }

        .user-card .username {
            font-weight: 600;
            display: block;
            font-size: 14px;
        }

        .user-card .status {
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status.online { color: var(--success); }
        .status.away { color: var(--warning); }
        .status.dnd { color: var(--danger); }

        .logout-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .logout-btn:hover {
            background: rgba(237, 66, 69, 0.1);
            transform: scale(1.05);
        }

        /* ========== ОСНОВНАЯ ОБЛАСТЬ ЧАТА ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        .chat-header {
            padding: 15px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-details {
            display: flex;
            flex-direction: column;
        }

        .chat-header-name {
            font-weight: 600;
            font-size: 18px;
        }

        .chat-header-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .chat-actions {
            display: flex;
            gap: 10px;
        }

        /* Контейнер сообщений */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-image: var(--wallpaper, none);
            background-size: cover;
            background-position: center;
        }

        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Отдельное сообщение */
        .message {
            display: flex;
            gap: 10px;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .message-content {
            flex: 1;
            max-width: 65%;
        }

        .message-header {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .message-sender {
            font-weight: 600;
        }

        .message-time {
            color: var(--text-secondary);
            font-size: 10px;
        }

        .message-bubble {
            background: var(--message-bg-other);
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            position: relative;
        }

        .message.me {
            flex-direction: row-reverse;
        }

        .message.me .message-content {
            align-items: flex-end;
        }

        .message.me .message-bubble {
            background: var(--accent);
            color: white;
        }

        .message-status {
            font-size: 10px;
            margin-top: 5px;
            text-align: right;
        }

        .message-status i {
            margin-left: 3px;
        }

        /* Файлы в сообщениях */
        .message-file {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .message-file:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        .message-file i {
            font-size: 28px;
        }

        .message-file-info {
            flex: 1;
        }

        .message-file-name {
            font-size: 14px;
            font-weight: 500;
        }

        .message-file-size {
            font-size: 11px;
            opacity: 0.7;
        }

        /* Изображения и видео */
        .message-media {
            max-width: 300px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .message-media:hover {
            transform: scale(1.02);
        }

        /* Область ввода */
        .input-area {
            padding: 15px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .typing-indicator {
            padding: 5px 10px;
            font-size: 12px;
            color: var(--text-secondary);
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .typing-dots {
            display: flex;
            gap: 3px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typingPulse 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingPulse {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .message-input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-tertiary);
            border-radius: 25px;
            padding: 8px 15px;
            transition: var(--transition);
        }

        .message-input-wrapper:focus-within {
            box-shadow: 0 0 0 2px var(--accent);
        }

        .input-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            transition: var(--transition);
        }

        .input-btn:hover {
            color: var(--accent);
            transform: scale(1.1);
        }

        .message-input-container {
            flex: 1;
        }

        #messageInput {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
            max-height: 100px;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        /* ========== ПРАВАЯ ПАНЕЛЬ (ПРОФИЛЬ) ========== */
        .right-panel {
            width: 320px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            transition: var(--transition);
            transform: translateX(100%);
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            z-index: 20;
        }

        .right-panel.open {
            transform: translateX(0);
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-content {
            padding: 20px;
        }

        .profile-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            cursor: pointer;
            border: 3px solid var(--accent);
        }

        .profile-field {
            margin-bottom: 20px;
        }

        .profile-field label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .profile-field input,
        .profile-field select,
        .profile-field textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        .profile-field input:focus,
        .profile-field select:focus,
        .profile-field textarea:focus {
            border-color: var(--accent);
        }

        /* ========== МОДАЛЬНЫЕ ОКНА ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 18px;
        }

        .modal-header .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 20px;
        }

        .modal-body input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
        }

        /* Результаты поиска */
        .search-result {
            padding: 12px;
            margin: 8px 0;
            background: var(--bg-tertiary);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
        }

        .search-result:hover {
            background: var(--accent);
            transform: translateX(5px);
        }

        /* ========== ЗВОНКИ (WebRTC) ========== */
        .call-modal .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            max-width: 800px;
        }

        .call-container {
            position: relative;
            min-height: 500px;
        }

        #localVideo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 12px;
            border: 2px solid var(--accent);
            object-fit: cover;
            z-index: 2;
            background: #000;
        }

        #remoteVideo {
            width: 100%;
            height: auto;
            border-radius: 12px;
            background: #000;
        }

        .call-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 3;
        }

        .call-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
        }

        .call-btn:hover {
            transform: scale(1.1);
            background: var(--accent);
        }

        .end-call {
            background: var(--danger);
        }

        .end-call:hover {
            background: #c0353a;
        }

        /* ========== УВЕДОМЛЕНИЯ ========== */
        #toastContainer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
        }

        .toast {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 12px;
            margin-top: 10px;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 4px 12px var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        .toast.info { border-left: 3px solid var(--accent); }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ========== СКРОЛЛБАР ========== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }

        /* ========== АДАПТИВНОСТЬ ========== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -320px;
                z-index: 15;
                height: 100vh;
            }

            .sidebar.open {
                left: 0;
            }

            .right-panel {
                width: 100%;
            }

            .message-content {
                max-width: 85%;
            }

            .chat-header-name {
                font-size: 16px;
            }

            .call-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            #localVideo {
                width: 100px;
                height: 75px;
            }
        }

        /* ========== АНИМАЦИИ ЗАГРУЗКИ ========== */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- БОКОВАЯ ПАНЕЛЬ -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fab fa-telegram"></i>
                    <span>Димаграм</span>
                </div>
                <div class="sidebar-actions">
                    <button class="icon-btn" id="newChatBtn" title="Новый чат">
                        <i class="fas fa-plus"></i>
                    </button>
                    <button class="icon-btn" id="settingsBtn" title="Настройки">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </div>

            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск контактов...">
            </div>

            <div class="chats-list" id="chatsList">
                <div class="empty-state">
                    <i class="fas fa-comments"></i>
                    <p>Нет чатов</p>
                    <p style="font-size: 12px;">Нажмите "+" чтобы добавить контакт</p>
                </div>
            </div>

            <div class="user-card">
                <img class="avatar" id="currentUserAvatar" src="https://via.placeholder.com/40" alt="">
                <div class="user-info">
                    <span class="username" id="currentUsername"></span>
                    <span class="status" id="currentUserStatus">
                        <i class="fas fa-circle"></i> Онлайн
                    </span>
                </div>
                <button class="logout-btn" id="logoutBtn" title="Выйти">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- ОСНОВНАЯ ОБЛАСТЬ ЧАТА -->
        <main class="chat-area">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-header-info">
                    <img class="chat-header-avatar" id="chatAvatar" src="" alt="">
                    <div class="chat-header-details">
                        <span class="chat-header-name" id="chatName"></span>
                        <span class="chat-header-status" id="chatStatus">
                            <i class="fas fa-circle" style="font-size: 8px;"></i> Оффлайн
                        </span>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn" id="callBtn" title="Аудиозвонок">
                        <i class="fas fa-phone"></i>
                    </button>
                    <button class="icon-btn" id="videoCallBtn" title="Видеозвонок">
                        <i class="fas fa-video"></i>
                    </button>
                    <button class="icon-btn" id="infoBtn" title="Информация">
                        <i class="fas fa-info-circle"></i>
                    </button>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="messages-list" id="messagesList">
                    <div class="empty-state">
                        <i class="fas fa-comment-dots"></i>
                        <p>Выберите чат</p>
                        <p style="font-size: 12px;">Начните общение прямо сейчас</p>
                    </div>
                </div>
            </div>

            <div class="input-area" id="inputArea" style="display: none;">
                <div class="typing-indicator" id="typingIndicator" style="display: none;">
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <span>Печатает...</span>
                </div>
                <div class="message-input-wrapper">
                    <button class="input-btn" id="emojiBtn" title="Эмодзи">
                        <i class="far fa-smile-wink"></i>
                    </button>
                    <button class="input-btn" id="attachBtn" title="Прикрепить файл">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <div class="message-input-container">
                        <textarea id="messageInput" placeholder="Сообщение..." rows="1"></textarea>
                    </div>
                    <button class="send-btn" id="sendBtn" title="Отправить">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>

        <!-- ПРАВАЯ ПАНЕЛЬ (ПРОФИЛЬ/НАСТРОЙКИ) -->
        <aside class="right-panel" id="rightPanel">
            <div class="panel-header">
                <h3>Профиль</h3>
                <button class="icon-btn" id="closePanelBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="panel-content" id="panelContent">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </aside>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО: ДОБАВЛЕНИЕ КОНТАКТА -->
    <div id="addContactModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-user-plus"></i> Добавить контакт</h3>
                <button class="close-modal closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="contactSearch" placeholder="Введите username пользователя">
                <button id="searchContactBtn" class="btn-primary">Поиск</button>
                <div id="searchResults"></div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО: ЗВОНОК -->
    <div id="callModal" class="modal call-modal">
        <div class="modal-content">
            <div class="call-container">
                <video id="localVideo" autoplay muted playsinline></video>
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="call-controls">
                    <button class="call-btn" id="muteBtn" title="Выключить звук">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button class="call-btn" id="videoToggleBtn" title="Выключить камеру">
                        <i class="fas fa-video"></i>
                    </button>
                    <button class="call-btn" id="screenBtn" title="Демонстрация экрана">
                        <i class="fas fa-desktop"></i>
                    </button>
                    <button class="call-btn end-call" id="endCallBtn" title="Завершить звонок">
                        <i class="fas fa-phone-slash"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- КОНТЕЙНЕР ДЛЯ УВЕДОМЛЕНИЙ -->
    <div id="toastContainer"></div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let socket = null;
        let currentUser = null;
        let currentChat = null;
        let contacts = [];
        let messages = [];
        let typingTimeout = null;
        let isTyping = false;
        
        // WebRTC переменные
        let peerConnection = null;
        let localStream = null;
        let currentCall = null;

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
            toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatTime(date) {
            const d = new Date(date);
            const now = new Date();
            const diff = now - d;
            
            if (diff < 24 * 60 * 60 * 1000) {
                return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            } else {
                return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getFileIcon(fileName) {
            const ext = fileName?.split('.').pop().toLowerCase() || '';
            if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) return 'fa-image';
            if (['mp4', 'webm', 'ogg', 'mov'].includes(ext)) return 'fa-video';
            if (['mp3', 'wav', 'ogg', 'flac'].includes(ext)) return 'fa-music';
            if (['pdf'].includes(ext)) return 'fa-file-pdf';
            if (['doc', 'docx'].includes(ext)) return 'fa-file-word';
            if (['xls', 'xlsx'].includes(ext)) return 'fa-file-excel';
            return 'fa-file';
        }

        function formatFileSize(bytes) {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            if (container) {
                container.scrollTop = container.scrollHeight;
            }
        }

        // ==================== АВТОРИЗАЦИЯ ====================
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login';
                return false;
            }
            return true;
        }

        async function loadCurrentUser() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    currentUser = await res.json();
                    document.getElementById('currentUsername').textContent = currentUser.display_name || currentUser.username;
                    if (currentUser.avatar) {
                        document.getElementById('currentUserAvatar').src = currentUser.avatar;
                    }
                    document.body.setAttribute('data-theme', currentUser.theme || 'dark');
                    return true;
                } else {
                    localStorage.clear();
                    window.location.href = '/login';
                    return false;
                }
            } catch (err) {
                console.error('Ошибка загрузки пользователя:', err);
                return false;
            }
        }

        // ==================== КОНТАКТЫ ====================
        async function loadContacts() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/contacts', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    contacts = await res.json();
                    updateChatsList();
                    return true;
                }
            } catch (err) {
                console.error('Ошибка загрузки контактов:', err);
            }
            return false;
        }

        async function addContact(contactId) {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/contacts', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ contactId })
                });
                if (res.ok) {
                    showToast('Контакт добавлен', 'success');
                    loadContacts();
                    return true;
                }
            } catch (err) {
                showToast('Ошибка добавления контакта', 'error');
            }
            return false;
        }

        async function removeContact(contactId) {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/contacts/${contactId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showToast('Контакт удален', 'success');
                    if (currentChat?.contactId === contactId) {
                        currentChat = null;
                        document.getElementById('chatHeader').style.display = 'none';
                        document.getElementById('inputArea').style.display = 'none';
                    }
                    loadContacts();
                }
            } catch (err) {
                showToast('Ошибка удаления контакта', 'error');
            }
        }

        function updateChatsList() {
            const container = document.getElementById('chatsList');
            if (!contacts.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-user-friends"></i>
                        <p>Нет контактов</p>
                        <p style="font-size: 12px;">Нажмите "+" чтобы добавить друзей</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            contacts.forEach(contact => {
                const div = document.createElement('div');
                div.className = `chat-item ${currentChat?.contactId === contact.contact_id ? 'active' : ''}`;
                div.innerHTML = `
                    <img class="chat-avatar" src="${contact.avatar || 'https://via.placeholder.com/48'}" alt="">
                    <div class="chat-info">
                        <div class="chat-name">${escapeHtml(contact.display_name || contact.username)}</div>
                        <div class="chat-last-message">
                            ${contact.status === 'online' ? '🟢 В сети' : '⚫ Был(а) недавно'}
                        </div>
                    </div>
                `;
                div.onclick = () => openChat(contact);
                container.appendChild(div);
            });
        }

        async function openChat(contact) {
            currentChat = {
                contactId: contact.contact_id,
                name: contact.display_name || contact.username,
                avatar: contact.avatar,
                status: contact.status
            };

            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'block';
            document.getElementById('chatName').textContent = currentChat.name;
            document.getElementById('chatAvatar').src = currentChat.avatar || 'https://via.placeholder.com/45';
            document.getElementById('chatStatus').innerHTML = currentChat.status === 'online' 
                ? '<i class="fas fa-circle" style="color: var(--success); font-size: 8px;"></i> В сети'
                : '<i class="fas fa-circle" style="color: var(--text-secondary); font-size: 8px;"></i> Не в сети';

            // Обновляем активный чат в списке
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            const activeItem = Array.from(document.querySelectorAll('.chat-item')).find(el => 
                el.querySelector('.chat-name')?.textContent === currentChat.name
            );
            if (activeItem) activeItem.classList.add('active');

            // Загружаем историю сообщений
            await loadMessages(contact.contact_id);
        }

        async function loadMessages(contactId) {
            const token = localStorage.getItem('token');
            const chatId = `chat_${Math.min(currentUser.id, contactId)}_${Math.max(currentUser.id, contactId)}`;
            
            try {
                const res = await fetch(`/api/messages/${chatId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                messages = data.messages || [];
                renderMessages();
            } catch (err) {
                console.error('Ошибка загрузки сообщений:', err);
            }
        }

        function renderMessages() {
            const container = document.getElementById('messagesList');
            if (!messages.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-dots"></i>
                        <p>Нет сообщений</p>
                        <p style="font-size: 12px;">Напишите что-нибудь...</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            messages.forEach(msg => {
                const isMe = msg.sender_id === currentUser.id;
                const div = document.createElement('div');
                div.className = `message ${isMe ? 'me' : ''}`;
                div.dataset.messageId = msg.message_id;
                
                let contentHtml = '';
                if (msg.message_type === 'text') {
                    contentHtml = escapeHtml(msg.content);
                } else if (msg.file_url) {
                    const fileExt = msg.file_name?.split('.').pop().toLowerCase() || '';
                    if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(fileExt)) {
                        contentHtml = `<img src="${msg.file_url}" class="message-media" onclick="window.open('${msg.file_url}')" alt="">`;
                    } else if (['mp4', 'webm'].includes(fileExt)) {
                        contentHtml = `<video src="${msg.file_url}" class="message-media" controls></video>`;
                    } else {
                        contentHtml = `
                            <div class="message-file" onclick="window.open('${msg.file_url}')">
                                <i class="fas ${getFileIcon(msg.file_name)}"></i>
                                <div class="message-file-info">
                                    <div class="message-file-name">${escapeHtml(msg.file_name)}</div>
                                    <div class="message-file-size">${formatFileSize(msg.file_size)}</div>
                                </div>
                            </div>
                        `;
                    }
                }
                
                div.innerHTML = `
                    ${!isMe ? `<img class="message-avatar" src="${msg.avatar || 'https://via.placeholder.com/36'}" alt="">` : ''}
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-sender">${escapeHtml(msg.display_name || msg.username)}</span>
                            <span class="message-time">${formatTime(msg.created_at)}</span>
                        </div>
                        <div class="message-bubble">${contentHtml}</div>
                        ${isMe ? `<div class="message-status"><i class="fas ${msg.status === 'read' ? 'fa-check-double' : 'fa-check'}"></i></div>` : ''}
                    </div>
                `;
                container.appendChild(div);
            });
            scrollToBottom();
        }

        function addMessageToUI(msg) {
            const container = document.getElementById('messagesList');
            if (container.innerHTML.includes('Нет сообщений') || container.innerHTML.includes('Выберите чат')) {
                container.innerHTML = '';
            }
            
            const isMe = msg.sender_id === currentUser.id;
            const div = document.createElement('div');
            div.className = `message ${isMe ? 'me' : ''}`;
            div.dataset.messageId = msg.message_id;
            
            let contentHtml = '';
            if (msg.message_type === 'text') {
                contentHtml = escapeHtml(msg.content);
            } else if (msg.file_url) {
                const fileExt = msg.file_name?.split('.').pop().toLowerCase() || '';
                if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(fileExt)) {
                    contentHtml = `<img src="${msg.file_url}" class="message-media" onclick="window.open('${msg.file_url}')" alt="">`;
                } else if (['mp4', 'webm'].includes(fileExt)) {
                    contentHtml = `<video src="${msg.file_url}" class="message-media" controls></video>`;
                } else {
                    contentHtml = `
                        <div class="message-file" onclick="window.open('${msg.file_url}')">
                            <i class="fas ${getFileIcon(msg.file_name)}"></i>
                            <div class="message-file-info">
                                <div class="message-file-name">${escapeHtml(msg.file_name)}</div>
                                <div class="message-file-size">${formatFileSize(msg.file_size)}</div>
                            </div>
                        </div>
                    `;
                }
            }
            
            div.innerHTML = `
                ${!isMe ? `<img class="message-avatar" src="${msg.sender_avatar || 'https://via.placeholder.com/36'}" alt="">` : ''}
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-sender">${escapeHtml(msg.sender_name)}</span>
                        <span class="message-time">${formatTime(new Date())}</span>
                    </div>
                    <div class="message-bubble">${contentHtml}</div>
                    ${isMe ? `<div class="message-status"><i class="fas fa-check"></i></div>` : ''}
                </div>
            `;
            container.appendChild(div);
            scrollToBottom();
        }

        // ==================== ОТПРАВКА СООБЩЕНИЙ ====================
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || !currentChat) return;
            
            const chatId = `chat_${Math.min(currentUser.id, currentChat.contactId)}_${Math.max(currentUser.id, currentChat.contactId)}`;
            
            socket.emit('send_message', {
                chatId: chatId,
                recipientId: currentChat.contactId,
                messageType: 'text',
                content: content
            });
            
            input.value = '';
            adjustTextareaHeight(input);
        }

        function adjustTextareaHeight(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
        }

        function handleTyping() {
            if (!currentChat) return;
            
            if (!isTyping) {
                isTyping = true;
                socket.emit('typing', {
                    recipientId: currentChat.contactId,
                    isTyping: true
                });
            }
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                isTyping = false;
                socket.emit('typing', {
                    recipientId: currentChat.contactId,
                    isTyping: false
                });
            }, 1000);
        }

        // ==================== ЗАГРУЗКА ФАЙЛОВ ====================
        async function attachFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file || !currentChat) return;
                
                const formData = new FormData();
                formData.append('file', file);
                const token = localStorage.getItem('token');
                
                try {
                    const res = await fetch('/api/upload', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    
                    const data = await res.json();
                    if (data.url) {
                        const chatId = `chat_${Math.min(currentUser.id, currentChat.contactId)}_${Math.max(currentUser.id, currentChat.contactId)}`;
                        socket.emit('send_message', {
                            chatId: chatId,
                            recipientId: currentChat.contactId,
                            messageType: 'file',
                            fileUrl: data.url,
                            fileName: data.name,
                            fileSize: data.size
                        });
                        showToast('Файл отправлен', 'success');
                    }
                } catch (err) {
                    showToast('Ошибка загрузки файла', 'error');
                }
            };
            input.click();
        }

        // ==================== ПРОФИЛЬ И НАСТРОЙКИ ====================
        async function showProfilePanel() {
            const panel = document.getElementById('rightPanel');
            const content = document.getElementById('panelContent');
            
            panel.classList.add('open');
            content.innerHTML = `
                <div class="profile-section">
                    <img class="profile-avatar" src="${currentUser.avatar || 'https://via.placeholder.com/100'}" id="profileAvatar" alt="">
                    <button class="btn-secondary" id="changeAvatarBtn">Изменить аватар</button>
                </div>
                <div class="profile-field">
                    <label>Имя пользователя</label>
                    <input type="text" id="editUsername" value="${escapeHtml(currentUser.username)}" readonly disabled>
                </div>
                <div class="profile-field">
                    <label>Отображаемое имя</label>
                    <input type="text" id="editDisplayName" value="${escapeHtml(currentUser.display_name || '')}">
                </div>
                <div class="profile-field">
                    <label>О себе</label>
                    <textarea id="editBio" rows="3">${escapeHtml(currentUser.bio || '')}</textarea>
                </div>
                <div class="profile-field">
                    <label>Статус</label>
                    <select id="editStatus">
                        <option value="online" ${currentUser.status === 'online' ? 'selected' : ''}>🟢 В сети</option>
                        <option value="away" ${currentUser.status === 'away' ? 'selected' : ''}>🌙 Отошёл</option>
                        <option value="dnd" ${currentUser.status === 'dnd' ? 'selected' : ''}>🔴 Не беспокоить</option>
                    </select>
                </div>
                <div class="profile-field">
                    <label>Тема оформления</label>
                    <select id="editTheme">
                        <option value="dark" ${currentUser.theme === 'dark' ? 'selected' : ''}>🌙 Тёмная</option>
                        <option value="light" ${currentUser.theme === 'light' ? 'selected' : ''}>☀️ Светлая</option>
                    </select>
                </div>
                <button id="saveProfileBtn" class="btn-primary">Сохранить изменения</button>
                <div style="margin-top: 20px;">
                    <hr style="border-color: var(--border); margin: 15px 0;">
                    <h4 style="margin-bottom: 10px;">Контакты</h4>
                    <div id="contactsListPanel"></div>
                </div>
            `;
            
            // Загружаем контакты в панель
            const contactsDiv = document.getElementById('contactsListPanel');
            contacts.forEach(contact => {
                const div = document.createElement('div');
                div.className = 'search-result';
                div.innerHTML = `
                    <img src="${contact.avatar || 'https://via.placeholder.com/32'}" style="width:32px;height:32px;border-radius:50%">
                    <span style="flex:1">${escapeHtml(contact.display_name || contact.username)}</span>
                    <button class="remove-contact" data-id="${contact.contact_id}" style="background:none;border:none;color:var(--danger);cursor:pointer">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                contactsDiv.appendChild(div);
            });
            
            document.getElementById('saveProfileBtn')?.addEventListener('click', saveProfile);
            document.getElementById('changeAvatarBtn')?.addEventListener('click', changeAvatar);
            document.querySelectorAll('.remove-contact').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await removeContact(btn.dataset.id);
                    showProfilePanel();
                });
            });
        }
        
        async function changeAvatar() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const formData = new FormData();
                formData.append('file', file);
                const token = localStorage.getItem('token');
                
                try {
                    const res = await fetch('/api/upload?type=avatar', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    const data = await res.json();
                    if (data.url) {
                        await fetch('/api/profile', {
                            method: 'PUT',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ avatar: data.url })
                        });
                        currentUser.avatar = data.url;
                        document.getElementById('currentUserAvatar').src = data.url;
                        showToast('Аватар обновлен', 'success');
                        showProfilePanel();
                    }
                } catch (err) {
                    showToast('Ошибка загрузки аватара', 'error');
                }
            };
            input.click();
        }
        
        async function saveProfile() {
            const token = localStorage.getItem('token');
            const data = {
                display_name: document.getElementById('editDisplayName')?.value,
                bio: document.getElementById('editBio')?.value,
                status: document.getElementById('editStatus')?.value,
                theme: document.getElementById('editTheme')?.value
            };
            
            try {
                const res = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    currentUser = { ...currentUser, ...data };
                    document.body.setAttribute('data-theme', data.theme);
                    document.getElementById('currentUsername').textContent = currentUser.display_name || currentUser.username;
                    showToast('Профиль обновлен', 'success');
                    if (currentChat) {
                        document.getElementById('chatName').textContent = currentChat.name;
                    }
                }
            } catch (err) {
                showToast('Ошибка сохранения', 'error');
            }
        }

        // ==================== ЗВОНКИ (WebRTC) ====================
        async function startCall(isVideo = false) {
            if (!currentChat) {
                showToast('Выберите чат для звонка', 'error');
                return;
            }
            
            const modal = document.getElementById('callModal');
            modal.classList.add('active');
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
                document.getElementById('localVideo').srcObject = localStream;
                if (!isVideo) {
                    document.getElementById('localVideo').style.display = 'none';
                }
                
                peerConnection = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });
                
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                
                peerConnection.ontrack = (event) => {
                    document.getElementById('remoteVideo').srcObject = event.streams[0];
                };
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.emit('ice_candidate', {
                            targetUserId: currentChat.contactId,
                            candidate: event.candidate
                        });
                    }
                };
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                socket.emit('call_user', {
                    targetUserId: currentChat.contactId,
                    callType: isVideo ? 'video' : 'audio',
                    signalData: offer
                });
                
                currentCall = { isVideo, targetUserId: currentChat.contactId };
            } catch (err) {
                console.error('Ошибка звонка:', err);
                showToast('Не удалось получить доступ к микрофону/камере', 'error');
                modal.classList.remove('active');
            }
        }
        
        function endCall() {
            if (peerConnection) peerConnection.close();
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            if (currentCall) {
                socket.emit('end_call', { targetUserId: currentCall.targetUserId });
            }
            document.getElementById('callModal').classList.remove('active');
            currentCall = null;
            peerConnection = null;
            localStream = null;
        }

        // ==================== ПОИСК КОНТАКТОВ ====================
        async function searchContact() {
            const query = document.getElementById('contactSearch').value;
            if (!query) return;
            
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const users = await res.json();
                
                const resultsDiv = document.getElementById('searchResults');
                resultsDiv.innerHTML = '';
                
                if (!users.length) {
                    resultsDiv.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
                    return;
                }
                
                users.forEach(user => {
                    const div = document.createElement('div');
                    div.className = 'search-result';
                    div.innerHTML = `
                        <img src="${user.avatar || 'https://via.placeholder.com/40'}" style="width:40px;height:40px;border-radius:50%">
                        <div style="flex:1">
                            <div><strong>${escapeHtml(user.display_name || user.username)}</strong></div>
                            <div style="font-size:12px;color:var(--text-secondary)">@${escapeHtml(user.username)}</div>
                        </div>
                        <button class="add-contact-btn" data-id="${user.id}" style="background:var(--accent);border:none;padding:8px 16px;border-radius:20px;color:white;cursor:pointer">
                            Добавить
                        </button>
                    `;
                    resultsDiv.appendChild(div);
                });
                
                document.querySelectorAll('.add-contact-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        await addContact(btn.dataset.id);
                        document.getElementById('addContactModal').classList.remove('active');
                        document.getElementById('contactSearch').value = '';
                        document.getElementById('searchResults').innerHTML = '';
                    });
                });
            } catch (err) {
                showToast('Ошибка поиска', 'error');
            }
        }

        // ==================== СОКЕТ ====================
        function initSocket() {
            const token = localStorage.getItem('token');
            socket = io({
                auth: { token }
            });
            
            socket.on('connect', () => {
                console.log('✅ Socket подключен');
            });
            
            socket.on('new_message', (msg) => {
                if (currentChat && msg.sender_id === currentChat.contactId) {
                    messages.push(msg);
                    addMessageToUI(msg);
                }
                showToast(`Новое сообщение от ${msg.sender_name}`, 'info');
            });
            
            socket.on('message_sent', (msg) => {
                if (currentChat && msg.recipient_id === currentChat.contactId) {
                    messages.push(msg);
                    addMessageToUI(msg);
                }
            });
            
            socket.on('user_typing', (data) => {
                if (currentChat && data.userId === currentChat.contactId) {
                    const indicator = document.getElementById('typingIndicator');
                    indicator.style.display = data.isTyping ? 'flex' : 'none';
                }
            });
            
            socket.on('user_status', (data) => {
                if (currentChat && data.userId === currentChat.contactId) {
                    const statusText = data.status === 'online' ? 'В сети' : 'Не в сети';
                    const statusColor = data.status === 'online' ? 'var(--success)' : 'var(--text-secondary)';
                    document.getElementById('chatStatus').innerHTML = `<i class="fas fa-circle" style="color: ${statusColor}; font-size: 8px;"></i> ${statusText}`;
                    if (currentChat) currentChat.status = data.status;
                }
                loadContacts();
            });
            
            socket.on('incoming_call', async (data) => {
                if (confirm(`📞 Входящий звонок от ${data.fromUsername}. Принять?`)) {
                    const modal = document.getElementById('callModal');
                    modal.classList.add('active');
                    
                    try {
                        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: data.callType === 'video' });
                        document.getElementById('localVideo').srcObject = localStream;
                        if (data.callType !== 'video') {
                            document.getElementById('localVideo').style.display = 'none';
                        }
                        
                        peerConnection = new RTCPeerConnection({
                            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                        });
                        
                        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                        
                        peerConnection.ontrack = (event) => {
                            document.getElementById('remoteVideo').srcObject = event.streams[0];
                        };
                        
                        peerConnection.onicecandidate = (event) => {
                            if (event.candidate) {
                                socket.emit('ice_candidate', {
                                    targetUserId: data.fromUserId,
                                    candidate: event.candidate
                                });
                            }
                        };
                        
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signalData));
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        
                        socket.emit('answer_call', {
                            targetUserId: data.fromUserId,
                            signalData: answer
                        });
                        
                        currentCall = { isVideo: data.callType === 'video', targetUserId: data.fromUserId };
                    } catch (err) {
                        showToast('Ошибка при ответе на звонок', 'error');
                    }
                } else {
                    socket.emit('end_call', { targetUserId: data.fromUserId });
                }
            });
            
            socket.on('call_answered', async (data) => {
                if (peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signalData));
                }
            });
            
            socket.on('ice_candidate', (data) => {
                if (peerConnection) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });
            
            socket.on('call_ended', () => {
                endCall();
                showToast('Звонок завершен', 'info');
            });
        }

        // ==================== ОБРАБОТЧИКИ ====================
        function bindEvents() {
            document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
            document.getElementById('attachBtn')?.addEventListener('click', attachFile);
            document.getElementById('newChatBtn')?.addEventListener('click', () => {
                document.getElementById('addContactModal').classList.add('active');
            });
            document.getElementById('settingsBtn')?.addEventListener('click', showProfilePanel);
            document.getElementById('infoBtn')?.addEventListener('click', showProfilePanel);
            document.getElementById('closePanelBtn')?.addEventListener('click', () => {
                document.getElementById('rightPanel').classList.remove('open');
            });
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                localStorage.clear();
                window.location.href = '/login';
            });
            document.getElementById('callBtn')?.addEventListener('click', () => startCall(false));
            document.getElementById('videoCallBtn')?.addEventListener('click', () => startCall(true));
            document.getElementById('endCallBtn')?.addEventListener('click', endCall);
            document.getElementById('searchContactBtn')?.addEventListener('click', searchContact);
            
            document.getElementById('muteBtn')?.addEventListener('click', () => {
                if (localStream) {
                    const audioTrack = localStream.getAudioTracks()[0];
                    if (audioTrack) {
                        audioTrack.enabled = !audioTrack.enabled;
                        document.getElementById('muteBtn').innerHTML = audioTrack.enabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
                    }
                }
            });
            
            document.getElementById('videoToggleBtn')?.addEventListener('click', () => {
                if (localStream) {
                    const videoTrack = localStream.getVideoTracks()[0];
                    if (videoTrack) {
                        videoTrack.enabled = !videoTrack.enabled;
                        document.getElementById('videoToggleBtn').innerHTML = videoTrack.enabled ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
                    }
                }
            });
            
            document.getElementById('screenBtn')?.addEventListener('click', async () => {
                try {
                    const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const videoTrack = screenStream.getVideoTracks()[0];
                    const sender = peerConnection?.getSenders().find(s => s.track?.kind === 'video');
                    if (sender) sender.replaceTrack(videoTrack);
                    videoTrack.onended = () => {
                        if (localStream) {
                            const originalVideoTrack = localStream.getVideoTracks()[0];
                            if (originalVideoTrack && sender) sender.replaceTrack(originalVideoTrack);
                        }
                    };
                } catch (err) {
                    showToast('Ошибка демонстрации экрана', 'error');
                }
            });
            
            document.getElementById('messageInput')?.addEventListener('input', () => {
                adjustTextareaHeight(document.getElementById('messageInput'));
                handleTyping();
            });
            
            document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            document.querySelectorAll('.close-modal, .closeModalBtn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.modal').forEach(modal => {
                        modal.classList.remove('active');
                    });
                });
            });
            
            document.getElementById('searchInput')?.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const items = document.querySelectorAll('.chat-item');
                items.forEach(item => {
                    const name = item.querySelector('.chat-name')?.textContent.toLowerCase() || '';
                    item.style.display = name.includes(query) ? 'flex' : 'none';
                });
            });
        }

        // ==================== ЗАПУСК ====================
        async function init() {
            if (!checkAuth()) return;
            await loadCurrentUser();
            await loadContacts();
            initSocket();
            bindEvents();
            
            // Закрытие модалок по клику вне
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.classList.remove('active');
                    }
                });
            });
        }
        
        init();
    </script>
</body>
